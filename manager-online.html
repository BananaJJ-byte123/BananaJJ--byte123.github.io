<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>主管排班后台 - 飞书版</title>
  <style>
    :root { --bg:#f5f7fb; --card:#fff; --ink:#111827; --muted:#667085; --line:#d8dee8; --blue:#2563eb; --green:#16845b; --amber:#b7791f; --red:#c24141; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: Arial, "Microsoft YaHei", sans-serif; color:var(--ink); background:var(--bg); }
    header { background:#101828; color:#fff; padding:16px 22px; display:flex; justify-content:space-between; gap:12px; align-items:center; }
    .header-actions { display:flex; align-items:center; gap:8px; flex-wrap:wrap; justify-content:flex-end; }
    .lang { width:auto; min-width:132px; border-color:#344054; background:#fff; color:#111827; }
    h1,h2,p { margin-top:0; } h1 { font-size:20px; margin-bottom:4px; } h2 { font-size:18px; }
    button,input,select { font:inherit; }
    button { border:1px solid var(--line); background:#fff; border-radius:6px; padding:9px 12px; cursor:pointer; min-height:38px; }
    button.primary { background:var(--blue); border-color:var(--blue); color:#fff; }
    input,select { border:1px solid var(--line); border-radius:6px; padding:9px 10px; width:100%; }
    label { display:grid; gap:6px; font-size:12px; color:#475467; font-weight:700; }
    main { padding:16px; max-width:1280px; margin:0 auto; }
    .muted { color:var(--muted); } .small { font-size:12px; }
    .grid { display:grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap:12px; }
    .panel,.stat { background:var(--card); border:1px solid var(--line); border-radius:8px; padding:14px; margin-bottom:14px; }
    .stat b { display:block; font-size:26px; margin-top:4px; }
    .toolbar { display:flex; gap:8px; flex-wrap:wrap; align-items:end; }
    .table-wrap { overflow:auto; border:1px solid var(--line); border-radius:8px; background:#fff; }
    table { border-collapse:collapse; width:100%; min-width:760px; }
    th,td { border-bottom:1px solid var(--line); padding:9px; text-align:left; white-space:nowrap; font-size:13px; }
    th { background:#f8fafc; color:#475467; }
    .badge { display:inline-flex; border-radius:999px; padding:3px 8px; font-size:12px; font-weight:800; }
    .green { background:#e8f7ef; color:#106b49; } .amber { background:#fff4df; color:#99610f; } .red { background:#ffe8e8; color:#a83333; } .blue { background:#e8efff; color:#1849b8; }
    .toast { position:fixed; left:50%; bottom:18px; transform:translateX(-50%); background:#101828; color:#fff; padding:10px 14px; border-radius:8px; opacity:0; pointer-events:none; transition:.2s; }
    .toast.show { opacity:1; }
    @media (max-width:900px){ .grid{grid-template-columns:1fr 1fr;} header{align-items:flex-start;} }
    @media (max-width:620px){ .grid{grid-template-columns:1fr;} }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>主管排班后台</h1>
      <p class="small" style="color:#cbd5e1;margin:0;" data-i18n="subtitle">飞书多维表格 + Vercel API + 机器人通知</p>
    </div>
    <div class="header-actions">
      <select id="lang" class="lang" onchange="setLang(this.value)" aria-label="Language">
        <option value="zh">中文</option>
        <option value="en">English</option>
        <option value="id">Bahasa</option>
      </select>
      <button onclick="location.href='./anchor-online.html'" data-i18n="openAnchor">打开主播入口</button>
    </div>
  </header>
  <main>
    <section class="panel">
      <h2 data-i18n="generateTitle">排班生成</h2>
      <div class="toolbar">
        <label><span data-i18n="startDate">开始日期</span><input id="startDate" type="date"></label>
        <label><span data-i18n="days">生成天数</span><input id="days" type="number" min="1" max="31" value="7"></label>
        <button class="primary" onclick="generateSchedule()" data-i18n="generateButton">生成排班并通知</button>
        <button onclick="loadAll()" data-i18n="refreshButton">刷新数据</button>
        <button onclick="sendSummary()" data-i18n="notifyButton">发送今日提醒</button>
      </div>
    </section>
    <section class="grid">
      <div class="stat"><span class="muted" data-i18n="anchors">主播</span><b id="anchorCount">-</b></div>
      <div class="stat"><span class="muted" data-i18n="brands">品牌/直播间</span><b id="brandCount">-</b></div>
      <div class="stat"><span class="muted" data-i18n="declarations">申报</span><b id="declarationCount">-</b></div>
      <div class="stat"><span class="muted" data-i18n="schedules">排班结果</span><b id="scheduleCount">-</b></div>
    </section>
    <section class="panel">
      <h2 data-i18n="scheduleTitle">排班结果</h2>
      <div id="schedules"></div>
    </section>
    <section class="panel">
      <h2 data-i18n="declarationTitle">主播申报</h2>
      <div id="declarations"></div>
    </section>
    <section class="panel">
      <h2 data-i18n="healthTitle">系统状态</h2>
      <pre id="health" class="small muted"></pre>
    </section>
  </main>
  <div class="toast" id="toast"></div>
  <script>
    const $ = (id) => document.getElementById(id);
    const field = (r, name) => r.fields?.[name] ?? "";
    const i18n = {
      zh: {
        subtitle: "飞书多维表格 + Vercel API + 机器人通知",
        openAnchor: "打开主播入口",
        generateTitle: "排班生成",
        startDate: "开始日期",
        days: "生成天数",
        generateButton: "生成排班并通知",
        refreshButton: "刷新数据",
        notifyButton: "发送今日提醒",
        anchors: "主播",
        brands: "品牌/直播间",
        declarations: "申报",
        schedules: "排班结果",
        scheduleTitle: "排班结果",
        declarationTitle: "主播申报",
        healthTitle: "系统状态",
        empty: "暂无数据",
        generating: "正在生成...",
        generated: (count, missing) => `已生成 ${count} 条，缺人 ${missing} 条`,
        notified: "通知已发送",
        scheduleColumns: ["日期","班次","开始时间","结束时间","主播姓名","品牌","直播间","状态","备注"],
        declarationColumns: ["主播姓名","申报类型","日期","开始时间","结束时间","原因","状态"]
      },
      en: {
        subtitle: "Feishu Base + Vercel API + Bot Notification",
        openAnchor: "Open anchor portal",
        generateTitle: "Schedule Generator",
        startDate: "Start date",
        days: "Days",
        generateButton: "Generate and notify",
        refreshButton: "Refresh data",
        notifyButton: "Send today's reminder",
        anchors: "Anchors",
        brands: "Brands / rooms",
        declarations: "Requests",
        schedules: "Schedules",
        scheduleTitle: "Schedule Results",
        declarationTitle: "Anchor Requests",
        healthTitle: "System Status",
        empty: "No data",
        generating: "Generating...",
        generated: (count, missing) => `Generated ${count} rows, missing ${missing}`,
        notified: "Notification sent",
        scheduleColumns: ["Date","Shift","Start","End","Anchor","Brand","Room","Status","Notes"],
        declarationColumns: ["Anchor","Type","Date","Start","End","Reason","Status"]
      },
      id: {
        subtitle: "Feishu Base + Vercel API + Notifikasi Bot",
        openAnchor: "Buka portal anchor",
        generateTitle: "Generator Jadwal",
        startDate: "Tanggal mulai",
        days: "Jumlah hari",
        generateButton: "Buat jadwal dan notifikasi",
        refreshButton: "Refresh data",
        notifyButton: "Kirim pengingat hari ini",
        anchors: "Anchor",
        brands: "Brand / room",
        declarations: "Permintaan",
        schedules: "Jadwal",
        scheduleTitle: "Hasil Jadwal",
        declarationTitle: "Permintaan Anchor",
        healthTitle: "Status Sistem",
        empty: "Belum ada data",
        generating: "Membuat jadwal...",
        generated: (count, missing) => `Berhasil membuat ${count} baris, kekurangan ${missing}`,
        notified: "Notifikasi terkirim",
        scheduleColumns: ["Tanggal","Shift","Mulai","Selesai","Anchor","Brand","Room","Status","Catatan"],
        declarationColumns: ["Anchor","Tipe","Tanggal","Mulai","Selesai","Alasan","Status"]
      }
    };
    let currentLang = localStorage.getItem("uiLang") || "zh";
    $("startDate").value = new Date().toISOString().slice(0, 10);
    function setLang(lang) {
      currentLang = lang;
      localStorage.setItem("uiLang", lang);
      $("lang").value = lang;
      document.documentElement.lang = lang === "id" ? "id" : lang === "en" ? "en" : "zh-CN";
      document.querySelectorAll("[data-i18n]").forEach((el) => {
        el.textContent = i18n[lang][el.dataset.i18n];
      });
    }
    function toast(text) {
      const el = $("toast"); el.textContent = text; el.classList.add("show");
      clearTimeout(window.__toast); window.__toast = setTimeout(() => el.classList.remove("show"), 1800);
    }
    async function api(path, options) {
      const res = await fetch(path, options);
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || "API error");
      return data;
    }
    function table(records, columns) {
      if (!records.length) return `<p class="muted">${i18n[currentLang].empty}</p>`;
      return `<div class="table-wrap"><table><thead><tr>${columns.map(c => `<th>${c.label}</th>`).join("")}</tr></thead><tbody>${records.map(r => `<tr>${columns.map(c => `<td>${field(r,c.field)}</td>`).join("")}</tr>`).join("")}</tbody></table></div>`;
    }
    function localizedColumns(fields, labels) {
      return fields.map((fieldName, index) => ({ field: fieldName, label: labels[index] }));
    }
    async function loadAll() {
      try {
        const [health, anchors, brands, declarations, schedules] = await Promise.all([
          api("/api/health"),
          api("/api/data?type=anchors"),
          api("/api/data?type=brands"),
          api("/api/data?type=declarations"),
          api("/api/data?type=schedules")
        ]);
        $("health").textContent = JSON.stringify(health.env, null, 2);
        $("anchorCount").textContent = anchors.records.length;
        $("brandCount").textContent = brands.records.length;
        $("declarationCount").textContent = declarations.records.length;
        $("scheduleCount").textContent = schedules.records.length;
        $("schedules").innerHTML = table(
          schedules.records.slice(-80).reverse(),
          localizedColumns(["日期","班次","开始时间","结束时间","主播姓名","品牌","直播间","状态","备注"], i18n[currentLang].scheduleColumns)
        );
        $("declarations").innerHTML = table(
          declarations.records.slice(-80).reverse(),
          localizedColumns(["主播姓名","申报类型","日期","开始时间","结束时间","原因","状态"], i18n[currentLang].declarationColumns)
        );
      } catch (e) {
        toast(e.message);
        $("health").textContent = e.stack || e.message;
      }
    }
    async function generateSchedule() {
      try {
        toast(i18n[currentLang].generating);
        const data = await api("/api/generate", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ startDate: $("startDate").value, days: $("days").value })
        });
        toast(i18n[currentLang].generated(data.count, data.missing));
        await loadAll();
      } catch (e) { toast(e.message); }
    }
    async function sendSummary() {
      try {
        await api("/api/notify", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ type: "主管提醒", text: "排班系统提醒：请查看今日排班、缺人班次和主播申报。" })
        });
        toast(i18n[currentLang].notified);
      } catch (e) { toast(e.message); }
    }
    setLang(currentLang);
    loadAll();
  </script>
</body>
</html>
