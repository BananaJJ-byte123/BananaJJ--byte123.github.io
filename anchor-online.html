<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>主播自助入口</title>
  <style>
    :root { --bg:#f5f7fb; --card:#fff; --ink:#111827; --muted:#667085; --line:#d8dee8; --blue:#2563eb; --green:#16845b; --amber:#b7791f; --dark:#101828; }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--ink); font-family:Arial,"Microsoft YaHei",sans-serif; }
    .shell { max-width:760px; min-height:100vh; margin:0 auto; background:#f7f8fb; }
    header { background:var(--dark); color:#fff; padding:18px; }
    .topbar { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
    .lang { width:auto; min-width:132px; border-color:#344054; background:#fff; color:#111827; padding:7px 9px; border-radius:6px; }
    main { padding:14px; }
    h1,h2,h3,p { margin-top:0; } h1 { font-size:22px; margin-bottom:4px; } h2 { font-size:18px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:8px; padding:14px; margin-bottom:12px; }
    .tabs { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:12px; }
    .tab { border:1px solid var(--line); background:#fff; color:#344054; border-radius:6px; padding:10px; font-weight:800; }
    .tab.active { background:#e8efff; color:#1849b8; border-color:#b7c7ff; }
    label { display:grid; gap:6px; font-size:12px; color:#475467; font-weight:800; margin-bottom:10px; }
    input,select,textarea,button { font:inherit; }
    input,select,textarea { border:1px solid var(--line); border-radius:6px; padding:10px 12px; width:100%; background:#fff; }
    textarea { min-height:90px; resize:vertical; }
    button { border:1px solid var(--blue); background:var(--blue); color:#fff; border-radius:6px; padding:10px 12px; cursor:pointer; font-weight:800; }
    button.secondary { border-color:var(--line); background:#fff; color:var(--ink); }
    button.good { border-color:#bfe8d3; background:#f1fbf6; color:var(--green); }
    .muted { color:var(--muted); } .small { font-size:12px; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .profile { display:flex; gap:8px; align-items:end; flex-wrap:wrap; }
    .profile label { flex:1 1 260px; margin:0; }
    .shift { border:1px solid var(--line); border-radius:8px; padding:12px; margin-bottom:10px; background:#fff; }
    .shift-head { display:flex; justify-content:space-between; gap:12px; align-items:flex-start; }
    .badge { display:inline-flex; border-radius:999px; padding:3px 8px; font-size:12px; font-weight:800; }
    .green { background:#e8f7ef; color:#106b49; } .amber { background:#fff4df; color:#99610f; } .blue { background:#e8efff; color:#1849b8; }
    .toast { position:fixed; left:50%; bottom:18px; transform:translateX(-50%); background:var(--dark); color:#fff; padding:10px 14px; border-radius:8px; opacity:0; pointer-events:none; transition:.2s; max-width:90vw; }
    .toast.show { opacity:1; }
    .hidden { display:none; }
    .actions { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
    @media (max-width:560px){ .grid,.tabs{grid-template-columns:1fr;} .shift-head{display:block;} }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div class="topbar">
        <div>
          <h1 data-i18n="title">主播自助入口</h1>
          <p class="small" style="color:#cbd5e1;margin:0;" data-i18n="subtitle">查看班表，确认班次，提交请假和换班申请</p>
        </div>
        <select id="lang" class="lang" onchange="setLang(this.value)" aria-label="Language">
          <option value="zh">中文</option>
          <option value="en">English</option>
          <option value="id">Bahasa</option>
        </select>
      </div>
    </header>
    <main>
      <section class="card">
        <div class="profile">
          <label><span data-i18n="anchorName">主播姓名</span><input id="anchorName" placeholder="Siti Rahma / Anna Smith"></label>
          <button onclick="saveAnchor()" data-i18n="saveName">保存</button>
          <button class="secondary" onclick="loadAll()" data-i18n="refresh">刷新</button>
        </div>
      </section>

      <nav class="tabs">
        <button class="tab active" data-tab="schedule" onclick="setTab('schedule')" data-i18n="tabSchedule">我的班表</button>
        <button class="tab" data-tab="swap" onclick="setTab('swap')" data-i18n="tabSwap">换班池</button>
        <button class="tab" data-tab="request" onclick="setTab('request')" data-i18n="tabRequest">提交申报</button>
      </nav>

      <section id="scheduleView" class="card">
        <h2 data-i18n="scheduleTitle">我的近期排班</h2>
        <div id="scheduleList"></div>
      </section>

      <section id="swapView" class="card hidden">
        <h2 data-i18n="swapTitle">换班池</h2>
        <div id="swapPanel"></div>
      </section>

      <section id="requestView" class="card hidden">
        <h2 data-i18n="requestTitle">提交申请</h2>
        <label><span data-i18n="declarationType">申报类型</span><select id="type"></select></label>
        <div class="grid">
          <label><span data-i18n="date">日期</span><input id="date" type="date"></label>
          <label><span data-i18n="originalShift">原班次</span><input id="originalShift" placeholder="可选"></label>
          <label><span data-i18n="startTime">开始时间</span><input id="startTime" type="time" value="09:00"></label>
          <label><span data-i18n="endTime">结束时间</span><input id="endTime" type="time" value="12:00"></label>
        </div>
        <label><span data-i18n="reason">原因/备注</span><textarea id="reason" placeholder="请简单说明原因"></textarea></label>
        <button onclick="submitDeclaration()" data-i18n="submitButton">提交给主管</button>
      </section>
    </main>
  </div>
  <div class="toast" id="toast"></div>

  <script>
    const $ = (id) => document.getElementById(id);
    const state = { schedules: [], declarations: [], selectedSwapFrom: "", tab: "schedule" };
    const declarationValues = [
      { value:"请假", label:{ zh:"请假", en:"Leave", id:"Cuti" } },
      { value:"换班", label:{ zh:"换班", en:"Shift swap", id:"Tukar shift" } },
      { value:"空闲时间", label:{ zh:"空闲时间", en:"Available time", id:"Waktu tersedia" } }
    ];
    const i18n = {
      zh: {
        title:"主播自助入口", subtitle:"查看班表，确认班次，提交请假和换班申请", anchorName:"主播姓名", saveName:"保存", refresh:"刷新",
        tabSchedule:"我的班表", tabSwap:"换班池", tabRequest:"提交申报", scheduleTitle:"我的近期排班", swapTitle:"换班池", requestTitle:"提交申请", declarationType:"申报类型",
        date:"日期", originalShift:"原班次", startTime:"开始时间", endTime:"结束时间", reason:"原因/备注", submitButton:"提交给主管",
        required:"请填写主播姓名和日期", submitted:"已提交，主管会收到通知", saved:"已保存主播姓名", empty:"暂无排班", confirmed:"班次已确认",
        confirm:"确认班次", time:"时间", brand:"品牌", room:"直播间", status:"状态", swap:"发起换班", swapFrom:"我的班次", swapTo:"想换的对方班次",
        submitSwap:"提交换班请求", incoming:"发给我的请求", outgoing:"我发起的请求", accept:"同意换班", reject:"拒绝", swapSent:"换班请求已发出", swapDone:"换班已完成"
      },
      en: {
        title:"Anchor Self-Service", subtitle:"View schedules, confirm shifts, and submit leave or swap requests", anchorName:"Anchor name", saveName:"Save", refresh:"Refresh",
        tabSchedule:"My schedule", tabSwap:"Swap pool", tabRequest:"Submit request", scheduleTitle:"My Upcoming Schedule", swapTitle:"Swap Pool", requestTitle:"Submit Request", declarationType:"Request type",
        date:"Date", originalShift:"Original shift", startTime:"Start time", endTime:"End time", reason:"Reason / notes", submitButton:"Submit to manager",
        required:"Please enter anchor name and date", submitted:"Submitted. The manager will be notified.", saved:"Anchor name saved", empty:"No schedules yet", confirmed:"Shift confirmed",
        confirm:"Confirm shift", time:"Time", brand:"Brand", room:"Room", status:"Status", swap:"Request swap", swapFrom:"My shift", swapTo:"Target shift",
        submitSwap:"Send swap request", incoming:"Requests to me", outgoing:"My requests", accept:"Accept swap", reject:"Reject", swapSent:"Swap request sent", swapDone:"Swap completed"
      },
      id: {
        title:"Portal Anchor", subtitle:"Lihat jadwal, konfirmasi shift, dan kirim cuti atau tukar shift", anchorName:"Nama anchor", saveName:"Simpan", refresh:"Refresh",
        tabSchedule:"Jadwal saya", tabSwap:"Pool tukar", tabRequest:"Kirim permintaan", scheduleTitle:"Jadwal Saya", swapTitle:"Pool Tukar Shift", requestTitle:"Kirim Permintaan", declarationType:"Jenis permintaan",
        date:"Tanggal", originalShift:"Shift awal", startTime:"Waktu mulai", endTime:"Waktu selesai", reason:"Alasan / catatan", submitButton:"Kirim ke supervisor",
        required:"Mohon isi nama anchor dan tanggal", submitted:"Terkirim. Supervisor akan menerima notifikasi.", saved:"Nama anchor tersimpan", empty:"Belum ada jadwal", confirmed:"Shift dikonfirmasi",
        confirm:"Konfirmasi shift", time:"Waktu", brand:"Brand", room:"Room", status:"Status", swap:"Minta tukar", swapFrom:"Shift saya", swapTo:"Shift tujuan",
        submitSwap:"Kirim permintaan tukar", incoming:"Permintaan untuk saya", outgoing:"Permintaan saya", accept:"Setujui tukar", reject:"Tolak", swapSent:"Permintaan tukar terkirim", swapDone:"Tukar shift selesai"
      }
    };
    let currentLang = localStorage.getItem("uiLang") || "zh";
    $("anchorName").value = localStorage.getItem("anchorName") || "";
    $("date").value = new Date().toISOString().slice(0,10);

    function t() { return i18n[currentLang]; }
    function field(r, name) { return r.fields?.[name] || ""; }
    function setLang(lang) {
      currentLang = lang;
      localStorage.setItem("uiLang", lang);
      $("lang").value = lang;
      document.documentElement.lang = lang === "id" ? "id" : lang === "en" ? "en" : "zh-CN";
      document.querySelectorAll("[data-i18n]").forEach((el) => { el.textContent = t()[el.dataset.i18n]; });
      const selected = $("type").value || "请假";
      $("type").innerHTML = declarationValues.map((item) => `<option value="${item.value}">${item.label[lang]}</option>`).join("");
      $("type").value = selected;
      renderSchedule();
      renderSwap();
    }
    function toast(text) {
      const el = $("toast"); el.textContent = text; el.classList.add("show");
      clearTimeout(window.__toast); window.__toast = setTimeout(() => el.classList.remove("show"), 1800);
    }
    async function api(path, options) {
      const res = await fetch(path, options);
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || "API error");
      return data;
    }
    function saveAnchor() {
      localStorage.setItem("anchorName", $("anchorName").value.trim());
      toast(t().saved);
      loadAll();
    }
    function setTab(tab) {
      state.tab = tab;
      document.querySelectorAll(".tab").forEach((el) => el.classList.toggle("active", el.dataset.tab === tab));
      $("scheduleView").classList.toggle("hidden", tab !== "schedule");
      $("swapView").classList.toggle("hidden", tab !== "swap");
      $("requestView").classList.toggle("hidden", tab !== "request");
      renderSwap();
    }
    async function loadAll() {
      try {
        const [schedules, declarations] = await Promise.all([
          api("/api/data?type=schedules"),
          api("/api/data?type=declarations")
        ]);
        state.schedules = schedules.records;
        state.declarations = declarations.records;
        renderSchedule();
        renderSwap();
      } catch (e) { toast(e.message); }
    }
    function badge(status) {
      const cls = status === "已确认" ? "green" : status === "已发布" ? "blue" : "amber";
      return `<span class="badge ${cls}">${status || "-"}</span>`;
    }
    function renderSchedule() {
      const name = $("anchorName").value.trim();
      const rows = state.schedules
        .filter((r) => !name || field(r, "主播姓名") === name)
        .sort((a, b) => `${field(a,"日期")} ${field(a,"开始时间")}`.localeCompare(`${field(b,"日期")} ${field(b,"开始时间")}`))
        .slice(0, 30);
      if (!rows.length) {
        $("scheduleList").innerHTML = `<p class="muted">${t().empty}</p>`;
        return;
      }
      $("scheduleList").innerHTML = rows.map((r) => {
        const status = field(r, "状态");
        return `<article class="shift">
          <div class="shift-head">
            <div>
              <h3>${field(r,"日期")} · ${field(r,"班次")}</h3>
              <p class="small muted">${t().time}: ${field(r,"开始时间")}-${field(r,"结束时间")}</p>
              <p class="small muted">${t().brand}: ${field(r,"品牌")} · ${t().room}: ${field(r,"直播间")}</p>
            </div>
            <div>${badge(status)}</div>
          </div>
          <div class="actions">
            ${status !== "已确认" ? `<button class="good" onclick="confirmShift('${r.record_id}')">${t().confirm}</button>` : ""}
            <button class="secondary" onclick="openSwap('${r.record_id}')">${t().swap}</button>
          </div>
        </article>`;
      }).join("");
    }
    function parseSwapMeta(text) {
      if (!text || !text.startsWith("SWAP_REQUEST|")) return null;
      return Object.fromEntries(text.split("|").slice(1).map((part) => {
        const i = part.indexOf("=");
        return i > -1 ? [part.slice(0, i), decodeURIComponent(part.slice(i + 1))] : [part, ""];
      }));
    }
    function scheduleLabel(r) {
      return `${field(r,"日期")} ${field(r,"班次")} ${field(r,"开始时间")}-${field(r,"结束时间")} · ${field(r,"主播姓名")} · ${field(r,"品牌")}`;
    }
    function openSwap(recordId) {
      state.selectedSwapFrom = recordId;
      setTab("swap");
    }
    function renderSwap() {
      if (!$("swapPanel")) return;
      const name = $("anchorName").value.trim();
      const mine = state.schedules.filter((r) => field(r, "主播姓名") === name);
      const others = state.schedules.filter((r) => field(r, "主播姓名") && field(r, "主播姓名") !== name);
      const requests = state.declarations
        .filter((r) => field(r, "申报类型") === "换班")
        .map((r) => ({ record:r, meta:parseSwapMeta(field(r, "原因")) }))
        .filter((item) => item.meta);
      const incoming = requests.filter((item) => field(item.record, "状态") === "待处理" && item.meta.target === name);
      const outgoing = requests.filter((item) => field(item.record, "主播姓名") === name);
      const fromOptions = mine.map((r) => `<option value="${r.record_id}" ${state.selectedSwapFrom === r.record_id ? "selected" : ""}>${scheduleLabel(r)}</option>`).join("");
      const toOptions = others.map((r) => `<option value="${r.record_id}">${scheduleLabel(r)}</option>`).join("");
      $("swapPanel").innerHTML = `
        <label>${t().swapFrom}<select id="swapFrom">${fromOptions}</select></label>
        <label>${t().swapTo}<select id="swapTo">${toOptions}</select></label>
        <label>${t().reason}<textarea id="swapReason" placeholder="${t().reason}"></textarea></label>
        <button onclick="submitSwapRequest()">${t().submitSwap}</button>
        <div class="shift"><h3>${t().incoming}</h3>${incoming.map(renderSwapRequest).join("") || `<p class="muted">${t().empty}</p>`}</div>
        <div class="shift"><h3>${t().outgoing}</h3>${outgoing.map(renderSwapRequest).join("") || `<p class="muted">${t().empty}</p>`}</div>`;
    }
    function renderSwapRequest(item) {
      const from = state.schedules.find((r) => r.record_id === item.meta.from);
      const to = state.schedules.find((r) => r.record_id === item.meta.to);
      const status = field(item.record, "状态");
      const isTarget = item.meta.target === $("anchorName").value.trim();
      return `<div class="shift">
        <p class="small muted">${field(item.record, "主播姓名")} -> ${item.meta.target} · ${badge(status)}</p>
        <p><b>${from ? scheduleLabel(from) : item.meta.from}</b></p>
        <p><b>${to ? scheduleLabel(to) : item.meta.to}</b></p>
        ${isTarget && status === "待处理" ? `<div class="actions"><button class="good" onclick="acceptSwap('${item.record.record_id}')">${t().accept}</button><button class="secondary" onclick="rejectSwap('${item.record.record_id}')">${t().reject}</button></div>` : ""}
      </div>`;
    }
    async function submitSwapRequest() {
      try {
        const fromScheduleId = $("swapFrom")?.value;
        const toScheduleId = $("swapTo")?.value;
        if (!fromScheduleId || !toScheduleId) return toast(t().empty);
        await api("/api/swap", {
          method:"POST",
          headers:{ "content-type":"application/json" },
          body:JSON.stringify({ action:"request", anchorName:$("anchorName").value.trim(), fromScheduleId, toScheduleId, reason:$("swapReason").value })
        });
        toast(t().swapSent);
        await loadAll();
      } catch (e) { toast(e.message); }
    }
    async function acceptSwap(declarationRecordId) {
      try {
        await api("/api/swap", {
          method:"POST",
          headers:{ "content-type":"application/json" },
          body:JSON.stringify({ action:"accept", declarationRecordId, anchorName:$("anchorName").value.trim() })
        });
        toast(t().swapDone);
        await loadAll();
      } catch (e) { toast(e.message); }
    }
    async function rejectSwap(declarationRecordId) {
      try {
        await api("/api/swap", {
          method:"POST",
          headers:{ "content-type":"application/json" },
          body:JSON.stringify({ action:"reject", declarationRecordId })
        });
        toast(t().submitted);
        await loadAll();
      } catch (e) { toast(e.message); }
    }
    async function confirmShift(recordId) {
      try {
        await api("/api/update", {
          method:"POST",
          headers:{ "content-type":"application/json" },
          body:JSON.stringify({ type:"schedules", recordId, fields:{ "状态":"已确认" }, notifyText:"主播已确认班次。" })
        });
        toast(t().confirmed);
        await loadAll();
      } catch (e) { toast(e.message); }
    }
    async function submitDeclaration() {
      try {
        const body = {
          anchorName: $("anchorName").value.trim(),
          type: $("type").value,
          date: $("date").value,
          startTime: $("startTime").value,
          endTime: $("endTime").value,
          originalShift: $("originalShift").value,
          reason: $("reason").value
        };
        if (!body.anchorName || !body.date) return toast(t().required);
        await api("/api/declarations", {
          method:"POST",
          headers:{ "content-type":"application/json" },
          body:JSON.stringify(body)
        });
        toast(t().submitted);
        $("reason").value = "";
        setTab("schedule");
        await loadAll();
      } catch (e) { toast(e.message); }
    }
    setLang(currentLang);
    loadAll();
  </script>
</body>
</html>
